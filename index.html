<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>English For Life · Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--surface:#13151f;--surface2:#1a1d27;--border:#1e2235;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --primary:#6366f1;--primary2:#4f46e5;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}
input,select,textarea,button{font-family:inherit;}
button{cursor:pointer;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.anim{animation:fadeIn .3s ease;}
.slide-up{animation:slideUp .4s ease;}

/* ════════════════════════════════════
   LOGIN
════════════════════════════════════ */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#1a1d4e 0%,var(--bg) 60%);
  padding:20px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:40px 36px;width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(99,102,241,.15);
}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.login-mark{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;
}
.login-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#f1f5f9;}
.login-sub{font-size:12px;color:var(--text3);}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#f1f5f9;margin-bottom:6px;}
.login-desc{font-size:14px;color:var(--text3);margin-bottom:28px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.login-field input,.login-field select{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;
  transition:border .2s,box-shadow .2s;
}
.login-field input:focus,.login-field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.login-btn{
  width:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;border:none;border-radius:12px;padding:13px;
  font-size:15px;font-weight:700;margin-top:8px;transition:opacity .2s,transform .15s;
}
.login-btn:hover{opacity:.9;transform:translateY(-1px);}
.login-hint{margin-top:24px;background:var(--surface2);border-radius:12px;padding:14px;}
.login-hint p{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.login-hint div{font-size:12px;color:var(--text2);line-height:1.7;}
.login-hint b{color:var(--primary);}
.login-error{background:#1f0f0f;border:1px solid #7f1d1d;color:#fca5a5;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}

/* ════════════════════════════════════
   APP SHELL
════════════════════════════════════ */
#app{display:none;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:200;
  transition:transform .3s ease,width .25s;
}
#sidebar.collapsed{width:64px;}
#sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;
}
.side-top{
  padding:16px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.brand-mark{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;
}
.brand-text .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#f1f5f9;white-space:nowrap;}
.brand-text .brand-sub{font-size:10px;color:var(--text3);white-space:nowrap;}
.collapse-btn{margin-left:auto;background:none;border:none;color:var(--text3);font-size:20px;flex-shrink:0;padding:2px 4px;}
.nav-section{padding:10px 0 4px;flex:1;overflow-y:auto;}
.nav-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:6px 16px 4px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  background:none;border:none;border-left:2px solid transparent;
  color:var(--text2);width:100%;text-align:left;transition:all .15s;
  position:relative;
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:#1a1d2e;color:#818cf8;border-left-color:var(--primary);}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center;}
.nav-label{font-size:13px;font-weight:600;white-space:nowrap;}
.side-bottom{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:8px;}
.user-av{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:11px;color:#fff;
}
.user-info .user-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;}
.user-info .user-role{font-size:10px;color:var(--text3);}
.logout-btn{margin-left:auto;background:none;border:none;font-size:16px;color:var(--text3);flex-shrink:0;}
.logout-btn:hover{color:var(--red);}

/* ── MAIN ── */
#main-wrap{
  margin-left:var(--sidebar);height:100vh;display:flex;flex-direction:column;
  transition:margin-left .25s;
}
#main-wrap.collapsed{margin-left:64px;}

/* ── TOPBAR ── */
#topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.menu-toggle{
  display:none;background:none;border:none;font-size:22px;
  color:var(--text2);padding:2px 6px;
}
.top-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#f1f5f9;}
.top-sub{font-size:11px;color:var(--text3);}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.notif-btn{
  position:relative;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;width:38px;height:38px;font-size:17px;
  display:flex;align-items:center;justify-content:center;
}
.notif-dot{
  position:absolute;top:-3px;right:-3px;width:16px;height:16px;
  background:var(--red);border-radius:50%;font-size:9px;font-weight:800;
  color:#fff;display:flex;align-items:center;justify-content:center;
}
.profile-chip{
  display:flex;align-items:center;gap:8px;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;padding:6px 12px;
}
.profile-chip .av{
  width:28px;height:28px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:10px;color:#fff;flex-shrink:0;
}
.profile-chip .pname{font-size:12px;font-weight:700;color:var(--text);}
.profile-chip .prole{font-size:10px;color:var(--text3);}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:20px;}

/* ════════════════════════════════════
   COMPONENTS
════════════════════════════════════ */
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{
  background:var(--surface);border-radius:14px;padding:16px;
  border:1px solid var(--border);display:flex;align-items:center;gap:12px;
  border-top:3px solid var(--c,var(--primary));
}
.stat-icon{
  width:42px;height:42px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:19px;flex-shrink:0;
  background:color-mix(in srgb,var(--c,var(--primary)) 15%,transparent);
}
.stat-value{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#f1f5f9;}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;margin-top:1px;}
.stat-sub{font-size:10px;color:var(--text3);}

/* Cards */
.card{background:var(--surface);border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:16px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.link-btn{background:none;border:none;color:var(--primary);font-size:12px;font-weight:600;}

/* Table */
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.search-box{
  flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;
}
.search-box:focus{outline:none;border-color:var(--primary);}
.sel{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;color:var(--text);font-size:13px;
}
.sel:focus{outline:none;border-color:var(--primary);}
.table-wrap{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:600px;}
th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
.dr{border-bottom:1px solid var(--surface2);background:var(--surface);transition:background .15s;}
.dr:hover{background:var(--surface2);}
td{padding:10px 14px;vertical-align:middle;}
.empty-t{text-align:center;padding:32px;color:var(--text3);font-size:14px;}

/* Misc */
.rp{font-size:13px;font-weight:600;color:var(--text);}
.rs{font-size:11px;color:var(--text3);margin-top:1px;}
.badge{font-size:11px;font-weight:700;border-radius:7px;padding:3px 8px;display:inline-block;white-space:nowrap;}
.lchip{background:var(--surface2);color:#818cf8;font-weight:800;font-size:12px;border-radius:6px;padding:3px 8px;}
.av-sm{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;flex-shrink:0;}
.av-lg{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0;}
.prog-bg{height:6px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.list-row{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:8px;transition:background .15s;}
.list-row:hover{background:var(--surface2);}

/* Buttons */
.btn{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);}
.btn-danger{background:#1f0f0f;border:1px solid #3f0f0f;color:#fca5a5;}
.btn-success{background:#052e16;border:1px solid #166534;color:#86efac;}
.tab-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--text3);}
.tab-btn.active{background:#1a1d2e;color:#818cf8;border-color:var(--primary2);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:520px;border:1px solid var(--border);max-height:92vh;display:flex;flex-direction:column;}
.modal.wide{max-width:720px;}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#f1f5f9;}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;line-height:1;}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-ft{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;}

/* Forms */
.fg{display:flex;flex-wrap:wrap;gap:12px;}
.f{flex:1 1 100%;display:flex;flex-direction:column;gap:5px;}
.f.h{flex:0 0 calc(50% - 6px);}
.f label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.f input,.f select,.f textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;width:100%;transition:border .2s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
.f textarea{resize:vertical;min-height:70px;}

/* Presence */
.pres-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:var(--surface2);margin-bottom:4px;}
.pres-present{background:#052e16;border:1px solid #166534;}
.pres-absent{background:#1f0f0f;border:1px solid #7f1d1d;}
.pres-btn{background:var(--border);border:none;border-radius:6px;width:28px;height:28px;font-size:13px;color:var(--text3);font-weight:700;}
.pres-btn.on{background:#166534;color:#86efac;}
.pres-btn.off{background:#7f1d1d;color:#fca5a5;}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:300px;}
.chat-body{flex:1;overflow-y:auto;padding:12px;background:var(--bg);border-radius:12px;display:flex;flex-direction:column;gap:10px;}
.msg-wrap{display:flex;gap:8px;align-items:flex-end;}
.msg-wrap.me{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:10px;flex-shrink:0;}
.msg-bubble{background:var(--surface);border-radius:14px 14px 14px 4px;padding:9px 12px;max-width:70%;}
.msg-bubble.me{background:var(--primary);border-radius:14px 14px 4px 14px;}
.msg-text{font-size:13px;color:var(--text);line-height:1.5;}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px;}
.chat-input-row{display:flex;gap:8px;margin-top:8px;}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:13px;}
.chat-input:focus{outline:none;border-color:var(--primary);}
.send-btn{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:10px;width:42px;height:42px;font-size:18px;display:flex;align-items:center;justify-content:center;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.cal-dh{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0;}
.cal-day{
  background:var(--surface2);border-radius:8px;padding:5px 3px;min-height:52px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  border:1px solid transparent;transition:all .15s;
}
.cal-day:hover{border-color:var(--primary);}
.cal-day.today{background:#1a1d2e;border-color:var(--primary);}
.cal-day.selected{background:var(--primary);border-color:var(--primary);}
.cal-num{font-size:12px;font-weight:600;color:var(--text);}
.cal-day.selected .cal-num{color:#fff;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;font-size:18px;color:var(--text2);}
.cal-month{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#f1f5f9;}

/* Progress bars */
.rep-row{margin-bottom:16px;}
.rep-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}

/* Toast */
#toast{
  position:fixed;bottom:20px;right:20px;background:#1a2e1a;
  border:1px solid #166534;color:#86efac;padding:12px 18px;
  border-radius:12px;font-weight:600;font-size:13px;z-index:999;
  display:none;animation:toastIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);
  max-width:300px;
}

/* ════════════════════════════════════
   RESPONSIVE
════════════════════════════════════ */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
}

@media(max-width:768px){
  :root{--sidebar:240px;}
  #sidebar{transform:translateX(-100%);}
  #sidebar.mobile-open{transform:translateX(0);}
  #sidebar-overlay.show{display:block;}
  #main-wrap{margin-left:0!important;}
  .menu-toggle{display:flex!important;}
  .profile-chip .pname,.profile-chip .prole{display:none;}
  #content{padding:14px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .stat-card{padding:12px;}
  .stat-value{font-size:18px;}
  .card-grid{grid-template-columns:1fr;}
  .toolbar{gap:8px;}
  .search-box{min-width:120px;}
  .collapse-btn{display:none;}
  .top-title{font-size:16px;}
  .f.h{flex:0 0 100%;}
  table{min-width:480px;}
  .modal{max-width:100%;margin:0;border-radius:18px 18px 0 0;max-height:95vh;}
  .overlay{align-items:flex-end;padding:0;}
}

@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-icon{width:36px;height:36px;font-size:16px;}
  .stat-value{font-size:16px;}
  .login-card{padding:28px 20px;}
  #content{padding:12px;}
  .card{padding:14px;}
  .cal-day{min-height:40px;}
  .cal-num{font-size:11px;}
}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-card slide-up">
    <div class="login-logo">
      <div class="login-mark">EF</div>
      <div>
        <div class="login-brand">English For Life</div>
        <div class="login-sub">Sistema de Gestão</div>
      </div>
    </div>
    <h1 class="login-title">Bem-vindo! 👋</h1>
    <p class="login-desc">Faça login para acessar o sistema.</p>
    <div id="login-error" class="login-error"></div>
    <div class="login-field">
      <label>Perfil de acesso</label>
      <select id="l-profile">
        <option value="">— Selecione —</option>
        <option value="admin">Administrador</option>
        <option value="coord">Coordenação</option>
        <option value="teacher">Professor</option>
        <option value="student">Aluno</option>
      </select>
    </div>
    <div class="login-field">
      <label>Usuário / E-mail</label>
      <input id="l-user" type="text" placeholder="seu@email.com"/>
    </div>
    <div class="login-field">
      <label>Senha</label>

  </div>`,true,`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>

function presRowHTML(s){
  const ip=presData.present.includes(s.id),ia=presData.absent.includes(s.id);
  return`<div class="pres-row ${ip?'pres-present':ia?'pres-absent':''}" id="pr-${s.id}">
    <div class="av-sm" style="background:#6366f1;width:26px;height:26px;font-size:10px">${av(s.name)}</div>
    <span style="flex:1;font-size:12px">${esc(s.name)}</span>
    <button class="pres-btn ${ip?'on':''}" onclick="toggleP(${s.id},true)">✓</button>
    <button class="pres-btn ${ia?'off':''}" onclick="toggleP(${s.id},false)">✗</button>
  </div>`;
}
function toggleP(sid,ip){
  if(ip){presData.present=[...presData.present.filter(x=>x!==sid),sid];presData.absent=presData.absent.filter(x=>x!==sid);}
  else{presData.absent=[...presData.absent.filter(x=>x!==sid),sid];presData.present=presData.present.filter(x=>x!==sid);}
  const row=document.getElementById('pr-'+sid);
  if(row){row.className='pres-row '+(ip?'pres-present':presData.absent.includes(sid)?'pres-absent':'');
    row.querySelectorAll('.pres-btn').forEach((b,i)=>{b.className='pres-btn '+(i===0&&ip?'on':i===1&&!ip?'off':'');});}
}
function refreshPresence(turmaId){
  presData={present:[],absent:[]};

function openPayModal(id){
  const p=id?payments.find(x=>x.id===id):{id:null,studentId:students[0]?.id||1,month:'',due:today(),value:310,status:'avencer',paidAt:'',method:''};
  openModal(id?'✏️ Editar':'💰 Lançar Mensalidade',`<div class="fg">
    <div class="f"><label>Aluno</label><select id="fp-s">${students.map(s=>`<option value="${s.id}" ${p.studentId==s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select></div>
    <div class="f h"><label>Mês</label><input id="fp-m" value="${esc(p.month)}" placeholder="Abr/2026"/></div>
    <div class="f h"><label>Vencimento</label><input id="fp-d" type="date" value="${p.due||''}"/></div>
    <div class="f h"><label>Valor (R$)</label><input id="fp-v" type="number" value="${p.value}"/></div>
    <div class="f h"><label>Status</label><select id="fp-st" onchange="togglePayF(this.value)">
      <option value="avencer" ${p.status==='avencer'?'selected':''}>A vencer</option>

      <option value="atrasado" ${p.status==='atrasado'?'selected':''}>Atrasado</option>

    <div id="pay-extra" style="display:${p.status==='pago'?'contents':'none'}">

      <div class="f h"><label>Forma</label><select id="fp-mt"><option value="">—</option>${['PIX','Boleto','Cartão','Dinheiro','Transferência'].map(m=>`<option ${p.method===m?'selected':''}>${m}</option>`).join('')}</select></div>

    <button class="btn" onclick="savePay(${id||'null'})">${id?'Salvar':'Lançar'}</button>`);
}
function togglePayF(v){const e=document.getElementById('pay-extra');if(e)e.style.display=v==='pago'?'contents':'none';}
function savePay(id){
  const month=document.getElementById('fp-m').value.trim();
  const value=document.getElementById('fp-v').value;
  if(!month||!value){alert('Mês e valor são obrigatórios.');return;}
  const sid=Number(document.getElementById('fp-s').value);
  const stu=students.find(s=>s.id===sid);
  const status=document.getElementById('fp-st').value;
  const obj={id:id||uid(),studentId:sid,student:stu?.name||'',month,due:document.getElementById('fp-d').value,value:Number(value),status,paidAt:status==='pago'?(document.getElementById('fp-pd')?.value||null):null,method:status==='pago'?(document.getElementById('fp-mt')?.value||null):null};

}
function markPaid(id){payments=payments.map(p=>p.id===id?{...p,status:'pago',paidAt:today()}:p);toast('✅ Pago!');render();}
function delPay(id){if(!confirm('Remover?'))return;payments=payments.filter(p=>p.id!==id);toast('🗑 Removido.');render();}

function renderReports(){
  return`<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">

  </div>

}
function renderFreqRep(){
  const data=students.filter(s=>s.status==='ativo').map(s=>{
    const al=lessons.filter(l=>l.turmaId===s.turma);
    const pr=al.filter(l=>(l.present||[]).includes(s.id)).length;
    const pct=al.length>0?Math.round((pr/al.length)*100):0;
    return{...s,pr,total:al.length,pct};
  }).sort((a,b)=>b.pct-a.pct);
  return`<div class="card"><div class="card-header"><span class="card-title">Frequência por Aluno</span></div>
    ${data.map(s=>{const t=turmas.find(x=>x.id===s.turma)||{};const c=s.pct>=75?'#10b981':s.pct>=50?'#f59e0b':'#ef4444';return`<div class="rep-row">
      <div class="rep-top"><div style="display:flex;align-items:center;gap:8px">
        <div class="av-sm" style="background:#6366f1">${av(s.name)}</div>
        <span class="rp">${esc(s.name)}</span>
        <span class="badge" style="background:${(t.color||'#6366f1')}22;color:${t.color||'#6366f1'}">${s.turma}</span>
      </div><div style="display:flex;gap:12px;align-items:center">
        <span class="rs">${s.pr}/${s.total}</span>
        <span style="font-weight:800;font-size:15px;color:${c}">${s.pct}%</span>
      </div></div>
      <div class="prog-bg"><div class="prog-fill" style="width:${s.pct}%;background:${c}"></div></div>
    </div>`;}).join('')}
  </div>`;
}
function renderFinRep(){
  const months=['Jan/2026','Fev/2026','Mar/2026','Abr/2026'];
  const data=months.map(m=>({month:m,pago:payments.filter(p=>p.month===m&&p.status==='pago').reduce((a,b)=>a+b.value,0),atrasado:payments.filter(p=>p.month===m&&p.status==='atrasado').reduce((a,b)=>a+b.value,0),avencer:payments.filter(p=>p.month===m&&p.status==='avencer').reduce((a,b)=>a+b.value,0)}));
  const mx=Math.max(...data.map(d=>d.pago),1);

      <div class="rep-top"><span style="font-weight:700;font-size:15px">${d.month}</span><span style="font-weight:800;color:#10b981;font-size:15px">${fmtBRL(d.pago)}</span></div>
      <div class="prog-bg"><div class="prog-fill" style="width:${Math.round((d.pago/mx)*100)}%;background:#10b981"></div></div>
      <div style="display:flex;gap:16px;margin-top:5px"><span style="font-size:12px;color:#ef4444">⚠ ${fmtBRL(d.atrasado)}</span><span style="font-size:12px;color:#f59e0b">⏳ ${fmtBRL(d.avencer)}</span></div>
    </div>`).join('')}
    <div style="border-top:1px solid var(--border);padding-top:14px;display:flex;justify-content:space-between;margin-top:8px">
      <span style="color:var(--text3);font-weight:600">Total</span>
      <span style="color:#10b981;font-weight:800;font-size:18px">${fmtBRL(data.reduce((a,b)=>a+b.pago,0))}</span>
    </div>
  </div>`;
}

let adminChatStudentId=null;
function adminChatWith(sid){
  adminChatStudentId=sid;
  const s=students.find(x=>x.id===sid);

  const area=document.getElementById('admin-chat-area');
  if(!area)return;
  area.innerHTML=`<div style="font-weight:700;font-size:14px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">
    💬 ${esc(s?.name)}
  </div>
  <div class="chat-body" id="admin-chat-body">
    ${msgs.map(m=>`<div class="msg-wrap ${m.from==='coord'||m.from==='admin'?'me':''}">
      <div class="msg-av" style="background:${m.from==='student'?'#3b82f6':'#10b981'}">${av(m.fromName)}</div>
      <div><div class="msg-bubble ${m.from==='coord'||m.from==='admin'?'me':''}"><div class="msg-text">${esc(m.text)}</div></div>
        <div class="msg-time ${m.from==='coord'||m.from==='admin'?'':''}${m.from!=='student'?'':'text-right'}">${m.time}</div>
      </div>
    </div>`).join('')}
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="admin-msg-input" placeholder="Digite a mensagem..." onkeydown="if(event.key==='Enter')sendAdminMsg()"/>
    <button class="send-btn" onclick="sendAdminMsg()">➤</button>
  </div>`;
  const cb=document.getElementById('admin-chat-body');
  if(cb)cb.scrollTop=cb.scrollHeight;
}
function sendAdminMsg(){
  const inp=document.getElementById('admin-msg-input');
  if(!inp||!inp.value.trim()||!adminChatStudentId)return;
  messages.push({id:uid(),from:currentUser.role,fromName:currentUser.name,to:'student',toId:adminChatStudentId,text:inp.value.trim(),time:'Agora'});
  inp.value='';
  adminChatWith(adminChatStudentId);
}

  const me=getMe();
  const turma=turmas.find(t=>t.id===me.turma)||{};
  const myLessons=lessons.filter(l=>l.turmaId===me.turma).sort((a,b)=>b.date.localeCompare(a.date));
  const myPays=payments.filter(p=>p.studentId===me.id);
  const presentes=myLessons.filter(l=>(l.present||[]).includes(me.id)).length;
  const freq=myLessons.length>0?Math.round((presentes/myLessons.length)*100):0;
  const nextHW=Object.entries(calEvents).filter(([,evs])=>evs.some(e=>e.type==='hw')).slice(0,2);
  return`<div style="background:linear-gradient(135deg,#1a1d2e,#0f1117);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px;display:flex;align-items:center;gap:16px">
    <div class="av-lg" style="background:linear-gradient(135deg,#6366f1,#4f46e5);width:56px;height:56px;font-size:18px">${av(me.name)}</div>
    <div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#f1f5f9">Olá, ${me.name.split(' ')[0]}! 👋</div>
      <div class="rs" style="margin-top:2px">${esc(turma.name||me.turma)} · Nível ${me.level}</div>
      <div class="rs">${esc(turma.teacher||'')} · ${turma.days||''} às ${turma.time||''}</div>
    </div>
  </div>
  <div class="stats-grid">
    ${[{icon:'✅',l:'Presenças',v:presentes,c:'#10b981'},{icon:'📊',l:'Frequência',v:freq+'%',c:'#6366f1'},{icon:'💳',l:'Mensalidades pagas',v:myPays.filter(p=>p.status==='pago').length,c:'#f59e0b'},{icon:'⚠',l:'A vencer/atrasado',v:myPays.filter(p=>p.status!=='pago').length,c:'#ef4444'}].map(s=>`<div class="stat-card" style="--c:${s.c}"><div class="stat-icon">${s.icon}</div><div><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div></div>`).join('')}
  </div>
  <div class="dash-grid">
    <div class="card"><div class="card-header"><span class="card-title">📒 Últimas Aulas</span></div>
      ${myLessons.slice(0,4).map(l=>`<div class="list-row">
        <div class="dot" style="background:${(l.present||[]).includes(me.id)?'#10b981':'#ef4444'}"></div>
        <div style="flex:1"><div class="rp">${esc(l.topic)}</div><div class="rs">${fmtD(l.date)}</div></div>
        <span class="badge" style="background:${(l.present||[]).includes(me.id)?'#dcfce7':'#fee2e2'};color:${(l.present||[]).includes(me.id)?'#166534':'#991b1b'}">${(l.present||[]).includes(me.id)?'Presente':'Falta'}</span>
      </div>`).join('')}
    </div>
    <div class="card"><div class="card-header"><span class="card-title">✏️ Homework Pendente</span></div>
      ${nextHW.map(([d,evs])=>evs.filter(e=>e.type==='hw').map(e=>`<div class="list-row" style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:6px">
        <span style="font-size:20px">✏️</span>
        <div style="flex:1"><div class="rp" style="font-size:13px">${esc(e.title)}</div><div class="rs">Entrega: ${d.split('-').reverse().join('/')} · ${e.time}</div></div>
        <span class="badge" style="background:#fef9c3;color:#854d0e">Pendente</span>
      </div>`).join('')).join('')}
    </div>
  </div>`;
}
function renderStudentLessons(){
  const me=getMe();
  const myLessons=lessons.filter(l=>l.turmaId===me.turma).sort((a,b)=>b.date.localeCompare(a.date));
  const presentes=myLessons.filter(l=>(l.present||[]).includes(me.id)).length;
  const freq=myLessons.length>0?Math.round((presentes/myLessons.length)*100):0;
  return`<div class="stats-grid">
    ${[{icon:'📒',l:'Total de Aulas',v:myLessons.length,c:'#6366f1'},{icon:'✅',l:'Presenças',v:presentes,c:'#10b981'},{icon:'❌',l:'Faltas',v:myLessons.length-presentes,c:'#ef4444'},{icon:'📊',l:'Frequência',v:freq+'%',c:freq>=75?'#10b981':freq>=50?'#f59e0b':'#ef4444'}].map(s=>`<div class="stat-card" style="--c:${s.c}"><div class="stat-icon">${s.icon}</div><div><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div></div>`).join('')}
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>Data</th><th>Tópico</th><th>Duração</th><th>Presença</th><th>Homework</th></tr></thead>
    <tbody>${myLessons.map(l=>{const ip=(l.present||[]).includes(me.id);return`<tr class="dr">
      <td><span class="rp">${fmtD(l.date)}</span></td>
      <td><div class="rp">${esc(l.topic)}</div>${l.notes?`<div class="rs">${esc(l.notes)}</div>`:''}</td>
      <td><span class="rs">${l.duration} min</span></td>
      <td><span class="badge" style="background:${ip?'#dcfce7':'#fee2e2'};color:${ip?'#166534':'#991b1b'}">${ip?'✓ Presente':'✗ Falta'}</span></td>
      <td>${l.homework?`<span style="font-size:13px">✏️ ${esc(l.homework)}</span>`:'—'}</td>
    </tr>`;}).join('')}
    </tbody>
  </table></div>`;
}
function renderStudentPayments(){
  const me=getMe();
  const myPays=payments.filter(p=>p.studentId===me.id);
  const pago=myPays.filter(p=>p.status==='pago').reduce((a,b)=>a+b.value,0);
  const aberto=myPays.filter(p=>p.status!=='pago').reduce((a,b)=>a+b.value,0);
  return`<div class="stats-grid">
    ${[{icon:'✅',l:'Total Pago',v:fmtBRL(pago),c:'#10b981'},{icon:'⏳',l:'Em Aberto',v:fmtBRL(aberto),c:'#f59e0b'},{icon:'💳',l:'Total registros',v:myPays.length,c:'#6366f1'},{icon:'📅',l:'Próx. vencimento',v:'05/04/2026',c:'#ef4444'}].map(s=>`<div class="stat-card" style="--c:${s.c}"><div class="stat-icon">${s.icon}</div><div><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div></div>`).join('')}
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>Mês</th><th>Vencimento</th><th>Valor</th><th>Status</th><th>Pago em</th><th>Forma</th></tr></thead>
    <tbody>${myPays.map(p=>`<tr class="dr">
      <td><span class="rp">${p.month}</span></td>
      <td><span class="rs">${fmtD(p.due)}</span></td>
      <td><span style="font-weight:700">${fmtBRL(p.value)}</span></td>
      <td>${sbadge(p.status)}</td>
      <td><span class="rs">${p.paidAt?fmtD(p.paidAt):'—'}</span></td>
      <td><span class="rs">${p.method||'—'}</span></td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}
function renderStudentCalendar(){
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const {y,m}=calState;
  const days=daysInMonth(y,m);
  const first=firstDay(y,m);
  const legend=Object.entries(evColors).map(([k,[,tc,dot]])=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:${dot}"></div><span style="font-size:11px;color:var(--text3)">${k}</span></div>`).join('');
  const dayEvs=selDay?(calEvents[selDay]||[]):[];
  return`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${legend}</div>
  <div class="card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calState.m--;if(calState.m<0){calState.m=11;calState.y--;}selDay=null;render()">‹</button>
      <span class="cal-month">${monthNames[m]} ${y}</span>
      <button class="cal-nav-btn" onclick="calState.m++;if(calState.m>11){calState.m=0;calState.y++;}selDay=null;render()">›</button>
    </div>
    <div class="cal-grid">
      ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}
      ${Array.from({length:first}).map(()=>'<div></div>').join('')}
      ${Array.from({length:days}).map((_,i)=>{
        const d=i+1;const key=fmtKey(y,m,d);
        const evs=calEvents[key]||[];
        const isTod=y===2026&&m===2&&d===30;
        const isSel=selDay===key;
        return`<div class="cal-day ${isTod?'today':''} ${isSel?'selected':''}" onclick="selDay='${key}';render()">
          <span class="cal-num">${d}</span>
          <div class="cal-dots">${evs.slice(0,3).map(e=>`<div class="cal-dot" style="background:${evColors[e.type]?.[2]||'#94a3b8'}"></div>`).join('')}</div>
        </div>`;}).join('')}
    </div>
    ${selDay&&dayEvs.length>0?`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
      <div style="font-weight:700;font-size:13px;margin-bottom:10px">📌 ${selDay.split('-').reverse().join('/')}</div>
      ${dayEvs.map(e=>{const[bg,tc,dot]=evColors[e.type]||['#f1f5f9','#475569','#94a3b8'];return`<div style="border-radius:8px;padding:10px 12px;margin-bottom:6px;background:${bg};border-left:4px solid ${dot}">
        <div style="font-weight:600;font-size:13px;color:${tc}">${esc(e.title)}</div>
        ${e.time?`<div style="font-size:12px;color:${tc};opacity:.7;margin-top:2px">🕐 ${e.time}</div>`:''}
      </div>`;}).join('')}
    </div>`:''}
    ${selDay&&dayEvs.length===0?`<div style="margin-top:12px;text-align:center;color:var(--text3);font-size:13px">Nenhum evento neste dia.</div>`:''}
  </div>`;
}
function renderStudentChat(){
  const me=getMe();
  const msgs=messages.filter(m=>m.toId===me.id||(m.from==='student'&&m.fromName===me.name)||(m.from==='coord'||m.from==='admin'));
  return`<div class="card chat-wrap">
    <div style="display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px">
      <div class="av-sm" style="background:#10b981">CO</div>
      <div><div class="rp">Coordenação</div><div class="rs">🟢 Online</div></div>
    </div>
    <div class="chat-body" id="stu-chat-body">
      ${msgs.map(m=>{const isMe=m.from==='student';return`<div class="msg-wrap ${isMe?'me':''}">
        <div class="msg-av" style="background:${isMe?'#6366f1':'#10b981'}">${av(m.fromName)}</div>
        <div><div class="msg-bubble ${isMe?'me':''}"><div class="msg-text">${esc(m.text)}</div></div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>`;}).join('')}
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="stu-msg" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')sendStuMsg()"/>
      <button class="send-btn" onclick="sendStuMsg()">➤</button>
    </div>
  </div>`;
}
function sendStuMsg(){
  const me=getMe();
  const inp=document.getElementById('stu-msg');
  if(!inp||!inp.value.trim())return;
  messages.push({id:uid(),from:'student',fromName:me.name,to:'coord',toId:null,text:inp.value.trim(),time:'Agora'});
  inp.value='';
  render();
  setTimeout(()=>{const b=document.getElementById('stu-chat-body');if(b)b.scrollTop=b.scrollHeight;},100);
  setTimeout(()=>{messages.push({id:uid(),from:'coord',fromName:'Coordenação',to:'student',toId:me.id,text:'Obrigada pela mensagem! Retornaremos em breve. ✉️',time:'Agora'});render();},1500);
}

function showNotifs(){toast('🔔 3 notificações: aula amanhã, HW vencendo, mensalidade de Abr/2026.');}
